services:
  # 1. PostgreSQL (Database)
  postgres:
    image: pgvector/pgvector:pg16
    container_name: qc-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: finsight
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - finsight_network
    restart: unless-stopped

  # 1b. pgAdmin (UI for PostgreSQL)
  pgadmin:
    image: dpage/pgadmin4
    container_name: qc-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@querycraft.com
      PGADMIN_DEFAULT_PASSWORD: password123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - finsight_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: finsight_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - finsight_network

  # 4. Qdrant (Vector Database for later)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: finsight_qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - finsight_network

volumes:
  postgres_data:
  qdrant_data:

networks:
  finsight_network:
    driver: bridge